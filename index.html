<body>
  <!-- Initial Loading Screen -->
  <div id="loading-screen">
    <div class="text-center">
      <img src="/Logo.png" alt="Tubarão" class="w-20 h-20 mx-auto mb-4" onerror="this.style.display='none'" />
      <div class="loader mx-auto"></div>
      <p class="text-zinc-500 text-sm mt-4">Carregando...</p>
    </div>
  </div>

  <!-- App Root -->
  <div id="root"></div>

  <!-- App Script -->
  <script type="module" src="/index.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // DEMO MODE: Force unregister old SW to clear stale cache
          const isDemoHost = window.location.hostname.includes('demo') || window.location.hostname.includes('vercel');
          if (isDemoHost) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const reg of registrations) {
              await reg.unregister();
              console.log('[DEMO] Unregistered old SW:', reg.scope);
            }
            // Clear all caches
            const cacheNames = await caches.keys();
            for (const name of cacheNames) {
              await caches.delete(name);
              console.log('[DEMO] Deleted cache:', name);
            }
          }

          // Register main SW
          const swReg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
          console.log('[PWA] Service Worker registered:', swReg.scope);

          // Check for updates periodically
          setInterval(() => {
            swReg.update();
          }, 60 * 60 * 1000); // Every hour

          // Handle SW updates
          swReg.onupdatefound = () => {
            const installingWorker = swReg.installing;
            if (installingWorker) {
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('[PWA] New content available! Refresh to update.');
                  }
                }
              };
            }
          };

          // Also register Firebase SW if needed
          if (window.firebase) {
            await navigator.serviceWorker.register('/firebase-messaging-sw.js');
            console.log('[PWA] Firebase SW registered');
          }
        } catch (error) {
          console.error('[PWA] SW registration failed:', error);
        }
      });
    }

    // Hide loading screen when app is ready
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          setTimeout(() => loadingScreen.remove(), 300);
        }
      }, 500);
    });

    // Prevent zoom on double-tap (iOS)
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  </script>
